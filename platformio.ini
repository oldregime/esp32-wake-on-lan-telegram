; =============================================================
; ESP32 Wake-on-LAN Telegram Bot — PlatformIO Configuration
; =============================================================
; Environments:
;   esp32dev          → Linux/macOS upload via /dev/ttyUSB0
;   esp32dev-windows  → Windows upload via COM port
;   esp32dev-ota      → Over-the-air upload (requires OTA IP)
; =============================================================

[common]
platform    = espressif32
board       = esp32dev
framework   = arduino
monitor_speed = 115200
lib_deps =
    witnessmenow/UniversalTelegramBot @ ^1.3.0
    bblanchon/ArduinoJson @ ^7.0.0
build_flags =
    -DCORE_DEBUG_LEVEL=0
    -DBOARD_HAS_PSRAM=0
    -DARDUINO_ESP32_DEV=1
    -DAPP_VERSION=\"2.1.0\"
board_build.partitions = huge_app.csv
board_build.filesystem  = littlefs

; ─────────────────────────────────────
; Linux / macOS
; ─────────────────────────────────────
[env:esp32dev]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps    = ${common.lib_deps}
build_flags = ${common.build_flags}
board_build.partitions = ${common.board_build.partitions}
board_build.filesystem  = ${common.board_build.filesystem}
upload_port = /dev/ttyUSB0
; Alternatives:
;   macOS:  /dev/cu.SLAB_USBtoUART   or   /dev/cu.usbserial-*
;   Linux:  /dev/ttyACM0

; ─────────────────────────────────────
; Windows
; ─────────────────────────────────────
[env:esp32dev-windows]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps    = ${common.lib_deps}
build_flags = ${common.build_flags}
board_build.partitions = ${common.board_build.partitions}
board_build.filesystem  = ${common.board_build.filesystem}
upload_port = COM3
; Change COM3 to your port — check Device Manager → Ports (COM & LPT)

; ─────────────────────────────────────
; OTA (Over-the-Air) — after first flash
; ─────────────────────────────────────
[env:esp32dev-ota]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
monitor_speed = ${common.monitor_speed}
lib_deps    = ${common.lib_deps}
build_flags =
    ${common.build_flags}
    -DOTA_ENABLED=1
board_build.partitions = ${common.board_build.partitions}
board_build.filesystem  = ${common.board_build.filesystem}
upload_protocol = espota
upload_port     = 192.168.1.XXX
; Replace with your ESP32's LAN IP address
; Find it via: /uptime command in Telegram or Serial Monitor on first boot

; ─────────────────────────────────────
; CI Build (no upload — compile check only)
; Used by GitHub Actions
; ─────────────────────────────────────
[env:ci]
platform    = ${common.platform}
board       = ${common.board}
framework   = ${common.framework}
lib_deps    = ${common.lib_deps}
build_flags = ${common.build_flags}
board_build.partitions = ${common.board_build.partitions}
board_build.filesystem  = ${common.board_build.filesystem}
; No upload_port — compile only